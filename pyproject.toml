[tool.poetry]
name = "rlef-code"
version = "0.1.0"
description = "Code generation agent with execution feedback via GRPO"
authors = ["Tarun Beerelli <tarun99.m@gmail.com>"]
readme = "README.md"
packages = [{ include = "rlef", from = "src" }]
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"
torch = ">=2.2.0"
transformers = ">=4.47.0"
datasets = ">=4.7.0"
accelerate = ">=1.4.0"
trl = ">=1.0.0"
numpy = ">=1.26,<3.0"
pandas = ">=2.0"
tqdm = ">=4.66"
evalplus = ">=0.3.0"
python-dotenv = "^1.2.2"
e2b-code-interpreter = ">=2.8.0"
pyyaml = ">=6.0"
bitsandbytes = ">=0.43.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-cov = "^5.0"
ruff = "^0.4.0"
pre-commit = "^3.7"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --cov=rlef --cov-report=term-missing"
pythonpath = ["src"]
markers = ["integration: tests that require external services (E2B API key, network)"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
