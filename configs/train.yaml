model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
dataset_path: "./data/openrlhf_apps_data.jsonl"
train_split: "train"
max_turns: 5
num_epochs: 3
learning_rate: 5.0e-6
output_dir: "./checkpoints"
wandb_project: "rlef-code"
wandb_entity: "tarunbeerelli-northeastern-university"

# Ablation Controls
ablation:
  use_log_reward: true
  use_step_credit: true
  use_normalization: true
  use_multi_turn: true
  use_lint_bonus: false  # <-- Disabled since we removed the lint tool
