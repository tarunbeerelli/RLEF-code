model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
data_dir: "data/raw/APPS"
difficulties: ["introductory"]
train_split: "train"
max_turns: 1
reward_type: "continuous"
shaped: true
credit_type: "step"
num_generations: 8
temperature: 0.9
kl_coef: 0.02
entropy_coef: 0.1
max_prompt_length: 1024
max_new_tokens: 256
learning_rate: 0.00001
per_device_batch: 1
gradient_accumulation_steps: 12
num_epochs: 3
bf16: true
load_in_4bit: false
gradient_checkpointing: true
logging_steps: 5
save_steps: 100
output_dir: "./checkpoints"
wandb_project: "rlef-code"
wandb_entity: "tarunbeerelli"
# Ablation Controls
ablation:
  use_log_reward: true         # Toggle for log-probability scaling
  use_step_credit: true        # Toggle for step-wise vs. outcome-only
  use_normalization: true      # Toggle for Z-score/Batch normalization
  use_multi_turn: true         # Toggle for multi-turn capability
  use_lint_bonus: true         # Toggle for compile/lint bonus
