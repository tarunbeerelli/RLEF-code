name: CI

on:
  push:
    branches: [main, phase/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install poetry
      - run: poetry config virtualenvs.in-project true && poetry install --without prod
      - run: PYTHONPATH=. poetry run ruff check src/ tests/
      - run: PYTHONPATH=. poetry run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install poetry
      - run: poetry config virtualenvs.in-project true && poetry install --without prod

      # Auto-compile protobuf files within their explicit package folder boundaries
      - name: Compile gRPC Proto Buffers
        run: |
          poetry run python -m grpc_tools.protoc -I. --python_out=src/rlef/ --grpc_python_out=src/rlef/ ./reward.proto

      - run: PYTHONPATH=. poetry run pytest tests/ -v --tb=short -m "not integration"
